<!DOCTYPE html>
<html lang="uk"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог насіння</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --green-dark: #1a4a1a;
    --green-mid: #2d7a2d;
    --green-light: #e8f5e8;
    --green-accent: #4caf50;
    --red: #c0392b;
    --cream: #fdfaf4;
    --border: #c8dfc8;
    --shadow: 0 4px 20px rgba(26,74,26,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', sans-serif; background: var(--cream); color: var(--green-dark); min-height: 100vh; }

  header {
    background: var(--green-dark); padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  }
  header h1 { font-family: 'Playfair Display', serif; color: #fff; font-size: 1.5rem; }
  header h1 span { color: #a8d5a2; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .selection-badge {
    background: var(--green-accent); color: #fff;
    font-size: 0.82rem; font-weight: 700; padding: 6px 14px;
    border-radius: 20px; transition: background 0.3s;
  }
  .selection-badge.full { background: var(--red); }
  .btn-print {
    background: #fff; color: var(--green-dark); border: none;
    font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 0.88rem;
    padding: 9px 20px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; gap: 7px; transition: all 0.2s;
  }
  .btn-print:hover:not(:disabled) { background: var(--green-accent); color: #fff; }
  .btn-print:disabled { opacity: 0.4; cursor: default; }

  .toolbar {
    padding: 16px 32px; background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 360px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
  .search-wrap input {
    width: 100%; padding: 9px 11px 9px 36px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: 'Manrope', sans-serif; font-size: 0.88rem;
    background: var(--cream); color: var(--green-dark); outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--green-accent); }

  .filter-select {
    padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px;
    font-family: 'Manrope', sans-serif; font-size: 0.85rem;
    background: var(--cream); color: var(--green-dark); outline: none; cursor: pointer;
  }
  .filter-select:focus { border-color: var(--green-accent); }

  .btn-add {
    background: var(--green-dark); color: #fff; border: none;
    font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 0.85rem;
    padding: 9px 18px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: background 0.2s; white-space: nowrap;
  }
  .btn-add:hover { background: var(--green-mid); }

  .hint { font-size: 0.78rem; color: #999; margin-left: auto; white-space: nowrap; }

  /* Selected strip */
  .selected-strip {
    display: none; padding: 10px 32px; background: #f0fff0;
    border-bottom: 1px solid var(--border);
    align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .selected-strip.visible { display: flex; }
  .selected-strip-label { font-size: 0.8rem; font-weight: 700; color: var(--green-dark); }
  .sel-chip {
    background: var(--green-dark); color: #fff; font-size: 0.75rem;
    padding: 3px 10px 3px 8px; border-radius: 20px;
    display: inline-flex; align-items: center; gap: 5px; cursor: default;
  }
  .sel-chip button {
    background: none; border: none; color: #fff; cursor: pointer;
    font-size: 0.9rem; line-height: 1; padding: 0; opacity: 0.7;
  }
  .sel-chip button:hover { opacity: 1; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px; padding: 24px 32px;
  }
  .card {
    background: #fff; border: 1.5px solid var(--border);
    border-radius: 12px; overflow: hidden; cursor: pointer;
    transition: all 0.2s; position: relative; box-shadow: var(--shadow);
    user-select: none;
  }
  .card:hover { border-color: var(--green-accent); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(26,74,26,0.14); }
  .card.selected { border-color: var(--green-accent); box-shadow: 0 0 0 3px rgba(76,175,80,0.22), var(--shadow); }
  .card.selected-double { border-color: var(--red); box-shadow: 0 0 0 3px rgba(192,57,43,0.22), var(--shadow); }
  .card.selected-double .card-check { background: var(--red); }

  .card-img {
    width: 100%; height: 130px; background: var(--green-light);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-img .img-placeholder { font-size: 2.2rem; opacity: 0.3; }

  .card-check {
    position: absolute; top: 9px; right: 9px;
    width: 24px; height: 24px; background: var(--green-accent);
    border-radius: 50%; display: none; align-items: center; justify-content: center;
  }
  .card.selected .card-check { display: flex; }
  .card-check svg { width: 13px; height: 13px; stroke: #fff; stroke-width: 3; fill: none; }
  .card-order {
    position: absolute; top: 9px; left: 9px;
    background: var(--green-dark); color: #fff; font-size: 0.68rem; font-weight: 700;
    width: 20px; height: 20px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
  }
  .card.selected .card-order { display: flex; }

  .card-body { padding: 12px 12px 10px; }
  .card-name { font-weight: 700; font-size: 0.82rem; color: var(--green-dark); line-height: 1.35; margin-bottom: 8px; min-height: 2.4em; }
  .card-meta { display: flex; justify-content: space-between; align-items: center; gap: 4px; }
  .card-qty { font-size: 0.75rem; font-weight: 600; color: #555; background: var(--green-light); padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
  .card-price { font-size: 0.9rem; font-weight: 700; color: var(--red); white-space: nowrap; }

  .card-actions { display: flex; gap: 5px; padding: 0 12px 10px; }
  .btn-edit, .btn-delete {
    flex: 1; border: 1px solid var(--border); background: none;
    font-family: 'Manrope', sans-serif; font-size: 0.72rem; font-weight: 600;
    padding: 4px; border-radius: 5px; cursor: pointer; transition: all 0.15s; color: #777;
  }
  .btn-edit:hover { background: var(--green-light); border-color: var(--green-accent); color: var(--green-dark); }
  .btn-delete:hover { background: #ffeaea; border-color: #e57373; color: var(--red); }

  .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #bbb; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 200;
    align-items: center; justify-content: center; backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 16px; padding: 28px;
    width: 370px; max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn { from { transform: scale(0.93) translateY(8px); opacity: 0; } }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--green-dark); margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 5px; }
  .form-group input {
    width: 100%; padding: 9px 11px; border: 1.5px solid var(--border); border-radius: 8px;
    font-family: 'Manrope', sans-serif; font-size: 0.88rem; color: var(--green-dark);
    outline: none; transition: border-color 0.2s; background: var(--cream);
  }
  .form-group input:focus { border-color: var(--green-accent); }
  .img-upload-area {
    border: 2px dashed var(--border); border-radius: 8px; padding: 14px;
    text-align: center; cursor: pointer; transition: all 0.2s;
    font-size: 0.8rem; color: #bbb; position: relative; overflow: hidden;
  }
  .img-upload-area:hover { border-color: var(--green-accent); color: var(--green-mid); }
  .img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; padding: 0; }
  .img-upload-area img { width: 100%; height: 80px; object-fit: cover; border-radius: 5px; margin-bottom: 4px; }
  .modal-actions { display: flex; gap: 9px; margin-top: 20px; }
  .btn-save {
    flex: 1; background: var(--green-dark); color: #fff; border: none;
    font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 0.9rem;
    padding: 10px; border-radius: 8px; cursor: pointer; transition: background 0.2s;
  }
  .btn-save:hover { background: var(--green-mid); }
  .btn-cancel {
    flex: 0 0 82px; background: none; color: #999; border: 1.5px solid var(--border);
    font-family: 'Manrope', sans-serif; font-size: 0.88rem;
    padding: 10px; border-radius: 8px; cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: #aaa; color: #555; }

  /* Print */
  @media print {
    * { box-sizing: border-box; }
    body > *:not(.print-area) { display: none !important; }
    @page {
      size: A4 landscape;
      margin: 0.7cm;
    }
    .print-area {
      display: block !important;
      width: 100%;
      height: 100vh;
    }
    .print-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 0.15cm;
      width: 100%;
      height: 100%;
    }
    .print-cell {
      border: 2pt solid #2d7a2d;
      border-radius: 6pt;
      background: #f0fff0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4pt 6pt;
      overflow: hidden;
      text-align: center;
    }
    .print-cell img {
      width: 100%;
      flex: 1 1 0;
      min-height: 0;
      object-fit: contain;
      border-radius: 3pt;
      display: block;
    }
    .print-cell .no-img {
      width: 100%;
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32pt;
      color: #ccc;
    }
    .print-cell .p-text {
      flex: 0 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-top: 3pt;
      gap: 1pt;
    }
    .print-cell .p-name {
      font-size: 17pt;
      font-weight: bold;
      color: #1a4a1a;
      line-height: 1.2;
    }
    .print-cell .p-qty {
      font-size: 11pt;
      font-weight: 600;
      color: #444;
    }
    .print-cell .p-price {
      font-size: 30pt;
      font-weight: bold;
      color: #c0392b;
    }
  }
  .print-area { display: none; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: 0.83rem; z-index: 999; pointer-events: none;
    animation: toastIn 0.2s ease;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } }
</style>
</head>

// Load from localStorage if available
(function() {
  try {
    const saved = localStorage.getItem('seedCatalogProducts');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length > 0) {
        products = parsed;
      }
    }
  } catch(e) {}
})();

function persistToStorage() {
  try { localStorage.setItem('seedCatalogProducts', JSON.stringify(products)); } catch(e) {}
}

function saveToFile() {
  // Get the current page source, replace products array with current data
  const xhr = new XMLHttpRequest();
  // Build new HTML by getting current document and replacing the products array
  const currentHTML = `<!DOCTYPE html>\n` + document.documentElement.outerHTML;
  // Find products array boundaries and replace with current data
  const marker1 = 'products = [';
  const marker2 = '];\n// Load from localStorage';
  const s = currentHTML.indexOf(marker1);
  const e = currentHTML.indexOf(marker2);
  if (s < 0 || e < 0) { alert('Помилка збереження'); return; }
  const newHTML = currentHTML.substring(0, s + marker1.length)
    + JSON.stringify(products).slice(1, -1)  // remove outer [ ]
    + currentHTML.substring(e);
  const blob = new Blob([newHTML], {type: 'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'насіння_каталог_fin.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('Файл збережено!');
}

// Build category list
function getCategories() {
  const cats = new Set();
  const keywords = ['Томат','Огірок','Капуста','Перець','Морква','Кукурудза','Буряк','Кавун','Диня','Гарбуз','Кабачок','Квасоля','Баклажан','Редис','Цибуля','Часник','Петрушка','Кріп'];
  products.forEach(p => {
    for (const k of keywords) {
      if (p.name.startsWith(k) || p.name.includes(k + ' ')) { cats.add(k); break; }
    }
  });
  return [...cats].sort();
}

function initCategories() {
  const sel = document.getElementById('categoryFilter');
  getCategories().forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

function renderGrid() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('categoryFilter').value;
  const grid = document.getElementById('grid');

  const filtered = products.filter(p => {
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.qty.toLowerCase().includes(q);
    const matchC = !cat || p.name.includes(cat);
    return matchQ && matchC;
  });

  document.getElementById('countHint').textContent = `Показано: ${filtered.length} з ${products.length}`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><p>Товарів не знайдено</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const count = selected.filter(id => id === p.id).length;
    const isSel = count > 0;
    const firstIdx = selected.indexOf(p.id);
    return `<div class="card${isSel ? ' selected' : ''}${count === 2 ? ' selected-double' : ''}" onclick="toggleSelect(${p.id})">
      <div class="card-img">
        ${p.img ? `<img src="${p.img}" loading="lazy" alt="">` : `<span class="img-placeholder">🌱</span>`}
        <div class="card-check">${count === 2 ? '<span style="font-size:0.85rem;font-weight:900">×2</span>' : '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'}</div>
        <div class="card-order">${isSel ? firstIdx+1 : ''}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${esc(p.name)}</div>
        <div class="card-meta">
          <span class="card-qty">${esc(p.qty) || '—'}</span>
          <span class="card-price">${esc(p.price) || '—'}</span>
        </div>
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="btn-edit" onclick="openModal(${p.id})">✏️ Ред.</button>
        <button class="btn-delete" onclick="deleteProduct(${p.id})">🗑</button>
      </div>
    </div>`;
  }).join('');

  updateBadge();
  renderChips();
}

function toggleSelect(id) {
  const count = selected.filter(x => x === id).length;
  if (count === 0) {
    // Перший клік — додати один раз
    if (selected.length >= MAX_SEL) { showToast('Вже обрано 8! Спочатку зніміть один.'); return; }
    selected.push(id);
  } else if (count === 1) {
    // Другий клік — додати вдруге (якщо є місце)
    if (selected.length >= MAX_SEL) { showToast('Немає місця для ×2. Спочатку зніміть інший товар.'); return; }
    selected.push(id);
  } else {
    // Третій клік — прибрати повністю
    selected = selected.filter(x => x !== id);
  }
  renderGrid();
}

function updateBadge() {
  const badge = document.getElementById('badge');
  const btn = document.getElementById('btnPrint');
  badge.textContent = `Обрано: ${selected.length} / ${MAX_SEL}`;
  badge.className = 'selection-badge' + (selected.length === MAX_SEL ? ' full' : '');
  btn.disabled = selected.length === 0;
  btn.innerHTML = selected.length > 0
    ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Друк (${selected.length})`
    : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Друк`;
}

function renderChips() {
  const strip = document.getElementById('selectedStrip');
  const container = document.getElementById('chipContainer');
  if (!selected.length) { strip.classList.remove('visible'); return; }
  strip.classList.add('visible');
  // Group by id to show ×2
  const seen = [];
  container.innerHTML = selected.map((id, i) => {
    if (seen.includes(id)) return ''; // skip duplicate, handled below
    const count = selected.filter(x => x === id).length;
    seen.push(id);
    const p = products.find(x => x.id === id);
    if (!p) return '';
    const short = p.name.length > 30 ? p.name.slice(0,28)+'…' : p.name;
    return `<span class="sel-chip">${count === 2 ? '×2 ' : ''}${esc(short)}<button onclick="toggleSelect(${id})" title="Зняти вибір">×</button></span>`;
  }).join('');
}

function doPrint() {
  const sel = selected.map(id => products.find(p => p.id === id)).filter(Boolean);
  while (sel.length < MAX_SEL) sel.push(null);
  document.getElementById('printArea').innerHTML = `
    <div class="print-grid">
      ${sel.map(p => p ? `
        <div class="print-cell">
          ${p.img ? `<img src="${p.img}" alt="">` : `<div class="no-img">🌱</div>`}
          <div class="p-text">
            <div class="p-name">${esc(p.name)}</div>
            <div class="p-qty">${esc(p.qty) || '—'}</div>
            <div class="p-price">${esc(p.price) || '—'}</div>
          </div>
        </div>` : `<div class="print-cell"><div class="no-img" style="opacity:0.15">—</div></div>`
      ).join('')}
    </div>`;
  window.print();
}

function openModal(id = null) {
  editingId = id; imgDataUrl = null; imgWebPBlob = null;
  const p = id ? products.find(x => x.id === id) : null;
  document.getElementById('modalTitle').textContent = id ? 'Редагувати товар' : 'Новий товар';
  document.getElementById('fName').value = p ? p.name : '';
  document.getElementById('fQty').value = p ? p.qty : '';
  document.getElementById('fPrice').value = p ? p.price : '';
  document.getElementById('fImg').value = '';
  const wrap = document.getElementById('imgPreviewWrap');
  if (p && p.img) { wrap.innerHTML = `<img src="${p.img}" alt=""><br><small>Натисніть щоб змінити</small>`; imgDataUrl = p.img; }
  else { wrap.innerHTML = '🌿 Натисніть щоб завантажити'; }
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 80);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

function previewImg(e) {
  const file = e.target.files[0]; if (!file) return;
  convertToWebP(file, 800, 0.82).then(({dataUrl, blob}) => {
    imgDataUrl = dataUrl;
    imgWebPBlob = blob;
    document.getElementById('imgPreviewWrap').innerHTML = `<img src="${imgDataUrl}" alt=""><br><small>Натисніть щоб змінити</small>`;
  });
}

function convertToWebP(file, maxSize, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxSize || h > maxSize) {
          if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
          else { w = Math.round(w * maxSize / h); h = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/webp', quality);
        canvas.toBlob(blob => resolve({dataUrl, blob}), 'image/webp', quality);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function nameToFilename(name) {
  return name.trim().replace(/\s+/g, '_').replace(/[\/\\:*?"<>|]/g, '') + '.webp';
}

function saveProduct() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').focus(); return; }
  const qty = document.getElementById('fQty').value.trim();
  const price = document.getElementById('fPrice').value.trim();
  if (editingId) {
    const p = products.find(x => x.id === editingId);
    p.name = name; p.qty = qty; p.price = price;
    // Оновлюємо фото ТІЛЬКИ якщо користувач завантажив нове (є blob)
    if (imgWebPBlob) {
      const filename = nameToFilename(name);
      newImgBlobs[filename] = imgWebPBlob;
      p.img = 'img/' + filename;
    }
  } else {
    const filename = nameToFilename(name);
    const imgPath = imgWebPBlob ? 'img/' + filename : null;
    if (imgWebPBlob) newImgBlobs[filename] = imgWebPBlob;
    products.push({ id: nextId++, name, qty, price, img: imgPath });
  }
  closeModal(); renderGrid(); persistToStorage();
  showToast('✅ Товар збережено! Натисніть «Зберегти ZIP» щоб оновити файли.');
}

function saveToZip() {
  const btn = document.getElementById('btnSaveZip');
  btn.disabled = true; btn.textContent = '⏳ Формую ZIP...';

  // Build updated HTML: replace products array
  const currentHTML = `<!DOCTYPE html>\n` + document.documentElement.outerHTML;
  const marker1 = 'products = [';
  const marker2 = '];\n// Load from localStorage';
  const s = currentHTML.indexOf(marker1);
  const e = currentHTML.indexOf(marker2);
  if (s < 0 || e < 0) { alert('Помилка збереження'); btn.disabled=false; btn.innerHTML='💾 Зберегти ZIP'; return; }
  const newHTML = currentHTML.substring(0, s + marker1.length)
    + JSON.stringify(products).slice(1, -1)
    + currentHTML.substring(e);

  const zip = new JSZip();
  zip.file('index.html', newHTML);

  // Fetch existing images (those already with img/ path, not base64)
  const imgFolder = zip.folder('img');
  const existingImgFetches = products
    .filter(p => p.img && p.img.startsWith('img/') && !newImgBlobs[p.img.replace('img/','')])
    .map(p => p.img)
    .filter((v, i, a) => a.indexOf(v) === i)
    .map(imgPath => fetch(imgPath).then(r => r.ok ? r.blob() : null).then(blob => blob ? imgFolder.file(imgPath.replace('img/',''), blob) : null).catch(()=>null));

  // Add new WebP blobs
  Object.entries(newImgBlobs).forEach(([fname, blob]) => imgFolder.file(fname, blob));

  Promise.all(existingImgFetches).then(() => {
    zip.generateAsync({type:'blob'}).then(zipBlob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(zipBlob);
      a.download = 'каталог_насіння.zip';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(a.href);
      btn.disabled = false;
      btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg> Зберегти ZIP';
      showToast('📦 ZIP збережено!');
    });
  });
}

function deleteProduct(id) {
  if (!confirm('Видалити цей товар?')) return;
  products = products.filter(p => p.id !== id);
  selected = selected.filter(s => s !== id);
  renderGrid(); persistToStorage();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

initCategories();
renderGrid();
</script>
